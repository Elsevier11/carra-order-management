name: Publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: vars
        shell: bash
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/Elsevier11/carra-order-management
            org.opencontainers.image.description=Backend API for Carra Consegne
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lower }}/carra-order-management-backend:latest
            ghcr.io/${{ steps.vars.outputs.owner_lower }}/carra-order-management-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: vars
        shell: bash
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/Elsevier11/carra-order-management
            org.opencontainers.image.description=Frontend UI for Carra Consegne
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lower }}/carra-order-management-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner_lower }}/carra-order-management-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
